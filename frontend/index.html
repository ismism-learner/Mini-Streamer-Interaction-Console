<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小主播互动助手</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: transparent;
  font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
  color: #fff;
  user-select: none;
}

/* ===== CSS Variables ===== */
:root {
  --pink: #FB7299;
  --pink-light: #FF8CAD;
  --pink-dark: #E05E82;
  --pink-glow: rgba(251, 114, 153, 0.5);
  --blue: #00A1D6;
  --blue-light: #33C1E6;
  --accent: #FF5C9C;
  --card-bg: rgba(20, 20, 30, 0.75);
  --card-bg-hover: rgba(30, 30, 45, 0.8);
  --text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  --bar-bg: rgba(0, 0, 0, 0.35);
  --border-glow: 0 0 20px rgba(251, 114, 153, 0.15);
}

/* ===== Status Bar ===== */
.status-bar {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--bar-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 8px 22px 8px 18px;
  min-width: 520px;
  will-change: opacity, transform;
  transition: opacity 0.4s ease, transform 0.4s ease;
}

.status-bar.idle {
  opacity: 0.35;
}

.status-bar:not(.idle) {
  opacity: 1;
}

.status-left {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  white-space: nowrap;
  min-width: 100px;
}

.status-icon {
  font-size: 16px;
  animation: none;
}

.status-bar.thinking .status-icon {
  animation: pulse 1.2s ease-in-out infinite;
}

.status-text {
  font-weight: 500;
  letter-spacing: 0.3px;
  text-shadow: var(--text-shadow);
}

/* Progress bar center */
.status-center {
  flex: 1;
  display: flex;
  align-items: center;
  min-width: 180px;
}

.progress-track {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}

.progress-fill {
  height: 100%;
  width: 0%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--pink), var(--accent), var(--blue), var(--pink));
  background-size: 200% 100%;
  transition: width 0.5s ease;
  will-change: width;
}

.progress-fill.shimmer {
  animation: shimmer 2s linear infinite;
}

/* Right side: char count */
.status-right {
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  white-space: nowrap;
  font-weight: 400;
  letter-spacing: 0.5px;
  min-width: 90px;
  text-align: right;
}

.status-right .count-num {
  color: var(--pink-light);
  font-weight: 600;
}

/* ===== Typing Indicator ===== */
.typing-indicator {
  position: absolute;
  bottom: 160px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 12px;
  opacity: 0;
  transition: opacity 0.3s ease;
  will-change: opacity;
  pointer-events: none;
}

.typing-indicator.visible {
  opacity: 1;
}

.typing-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), var(--accent));
  padding: 2px;
  flex-shrink: 0;
  animation: avatarPulse 0.6s ease-in-out infinite alternate;
}

.typing-avatar-inner {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: #1a1a2e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.typing-bubble {
  background: var(--card-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(251, 114, 153, 0.2);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 4px;
  box-shadow: var(--border-glow);
}

.typing-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--pink-light);
  animation: bounceDots 1.2s ease-in-out infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

.typing-label {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  margin-right: 4px;
  letter-spacing: 0.5px;
}

/* ===== Question Card ===== */
.question-card {
  position: absolute;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  width: auto;
  max-width: 680px;
  min-width: 360px;
  opacity: 0;
  will-change: transform, opacity;
  pointer-events: none;
  z-index: 10;
}

.question-card.visible {
  animation: slideUpCard 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.question-card.hiding {
  animation: fadeOutDown 0.35s ease-in forwards;
}

.card-inner {
  background: var(--card-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 14px;
  border-left: 4px solid var(--pink);
  padding: 18px 22px 18px 20px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4), var(--border-glow), inset 0 1px 0 rgba(255,255,255,0.05);
  position: relative;
  overflow: hidden;
}

.card-inner::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(135deg, rgba(251,114,153,0.03) 0%, transparent 60%);
  pointer-events: none;
}

.card-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.card-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), var(--accent));
  padding: 2px;
  flex-shrink: 0;
  position: relative;
}

.card-avatar::after {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), transparent, var(--blue));
  opacity: 0.4;
  animation: avatarRotate 3s linear infinite;
}

.card-avatar-inner {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: #1a1a2e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  position: relative;
  z-index: 1;
}

.card-username {
  font-size: 14px;
  font-weight: 600;
  color: var(--pink-light);
  letter-spacing: 0.5px;
  text-shadow: 0 0 10px rgba(251,114,153,0.3);
}

.card-badge {
  font-size: 10px;
  background: rgba(251,114,153,0.2);
  border: 1px solid rgba(251,114,153,0.25);
  color: var(--pink-light);
  padding: 1px 7px;
  border-radius: 8px;
  font-weight: 500;
  letter-spacing: 0.5px;
}

.card-question {
  font-size: 21px;
  font-weight: 700;
  line-height: 1.55;
  text-shadow: var(--text-shadow);
  letter-spacing: 0.5px;
  position: relative;
  z-index: 1;
}

.card-question::before {
  content: '\201C';
  color: var(--pink);
  opacity: 0.4;
  font-size: 24px;
  margin-right: 2px;
}

.card-question::after {
  content: '\201D';
  color: var(--pink);
  opacity: 0.4;
  font-size: 24px;
  margin-left: 2px;
}

/* ===== Danmaku Tracks ===== */
.danmaku-container {
  position: absolute;
  top: 60px;
  left: 0;
  right: 0;
  height: 360px;
  overflow: hidden;
  pointer-events: none;
  z-index: 20;
}

.danmaku-track {
  position: absolute;
  left: 0;
  right: 0;
  height: 42px;
  display: flex;
  align-items: center;
  overflow: hidden;
}

.danmaku-track:nth-child(1) { top: 6px; }
.danmaku-track:nth-child(2) { top: 54px; }
.danmaku-track:nth-child(3) { top: 102px; }
.danmaku-track:nth-child(4) { top: 150px; }
.danmaku-track:nth-child(5) { top: 198px; }
.danmaku-track:nth-child(6) { top: 246px; }

.danmaku-item {
  position: absolute;
  white-space: nowrap;
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  text-shadow:
    0 0 3px rgba(0,0,0,0.95),
    0 0 6px rgba(0,0,0,0.8),
    1px 1px 2px rgba(0,0,0,0.9),
    -1px -1px 2px rgba(0,0,0,0.9);
  letter-spacing: 1.5px;
  will-change: transform;
  line-height: 42px;
  padding: 0 8px;
  transform: translateX(100vw);
}

.danmaku-item.scrolling {
  animation: danmakuScroll var(--speed, 12s) linear forwards;
}

.danmaku-item.pink-danmaku {
  color: var(--pink-light);
  text-shadow:
    0 0 4px rgba(251,114,153,0.4),
    0 0 8px rgba(251,114,153,0.2),
    1px 1px 2px rgba(0,0,0,0.9);
}

/* ===== Queue Counter ===== */
.queue-counter {
  position: absolute;
  bottom: 24px;
  right: 30px;
  font-size: 12px;
  color: rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  padding: 4px 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.04);
  transition: opacity 0.3s ease;
  will-change: opacity;
  display: flex;
  align-items: center;
  gap: 4px;
  letter-spacing: 0.5px;
}

.queue-counter.hidden {
  opacity: 0;
  pointer-events: none;
}

.queue-counter .queue-num {
  color: var(--pink-light);
  font-weight: 600;
  min-width: 10px;
  text-align: center;
}

/* ===== Connection Status ===== */
.connection-status {
  position: absolute;
  bottom: 24px;
  left: 30px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.3px;
}

.conn-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  transition: background 0.4s ease, box-shadow 0.4s ease;
}

.conn-dot.connected {
  background: #4ADE80;
  box-shadow: 0 0 6px rgba(74,222,128,0.5);
}

.conn-dot.disconnected {
  background: #EF4444;
  box-shadow: 0 0 6px rgba(239,68,68,0.4);
}

.conn-dot.connecting {
  background: #FBBF24;
  box-shadow: 0 0 6px rgba(251,191,36,0.4);
  animation: pulse 1s ease-in-out infinite;
}

.conn-text {
  transition: color 0.4s ease;
}

/* ===== Animations ===== */
@keyframes slideUpCard {
  0% {
    transform: translateX(-50%) translateY(60px);
    opacity: 0;
  }
  100% {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
}

@keyframes fadeOutDown {
  0% {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  100% {
    transform: translateX(-50%) translateY(30px);
    opacity: 0;
  }
}

@keyframes danmakuScroll {
  0% {
    transform: translateX(calc(100vw));
  }
  100% {
    transform: translateX(calc(-100% - 50px));
  }
}

@keyframes bounceDots {
  0%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-7px); }
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

@keyframes avatarPulse {
  0% { box-shadow: 0 0 0 0 rgba(251,114,153,0.2); }
  100% { box-shadow: 0 0 12px 4px rgba(251,114,153,0.15); }
}

@keyframes avatarRotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* ===== Responsive ===== */
@media (max-width: 1920px) {
  html, body { width: 100%; height: 100%; }
}
</style>
</head>
<body>

<!-- ===== Status Bar ===== -->
<div class="status-bar idle" id="statusBar">
  <div class="status-left">
    <span class="status-icon" id="statusIcon">馃帣</span>
    <span class="status-text" id="statusText">姝ｅ湪鍚綘璁?..</span>
  </div>
  <div class="status-center">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>
  <div class="status-right">
    <span class="count-num" id="charCount">0</span> / 2000 瀛?  </div>
</div>

<!-- ===== Danmaku Container ===== -->
<div class="danmaku-container" id="danmakuContainer">
  <div class="danmaku-track" id="track0"></div>
  <div class="danmaku-track" id="track1"></div>
  <div class="danmaku-track" id="track2"></div>
  <div class="danmaku-track" id="track3"></div>
  <div class="danmaku-track" id="track4"></div>
  <div class="danmaku-track" id="track5"></div>
</div>

<!-- ===== Typing Indicator ===== -->
<div class="typing-indicator" id="typingIndicator">
  <div class="typing-avatar">
    <div class="typing-avatar-inner">馃懁</div>
  </div>
  <div class="typing-bubble">
    <span class="typing-label">姝ｅ湪杈撳叆</span>
    <span class="typing-dot"></span>
    <span class="typing-dot"></span>
    <span class="typing-dot"></span>
  </div>
</div>

<!-- ===== Question Card ===== -->
<div class="question-card" id="questionCard">
  <div class="card-inner">
    <div class="card-top">
      <div class="card-avatar">
        <div class="card-avatar-inner">馃懁</div>
      </div>
      <span class="card-username">鐑績瑙備紬</span>
      <span class="card-badge">鎻愰棶</span>
    </div>
    <div class="card-question" id="questionText"></div>
  </div>
</div>

<!-- ===== Connection Status ===== -->
<div class="connection-status">
  <span class="conn-dot disconnected" id="connDot"></span>
  <span class="conn-text" id="connText">鏈繛鎺?/span>
</div>

<!-- ===== Queue Counter ===== -->
<div class="queue-counter hidden" id="queueCounter">
  <span>闃熷垪</span>
  <span class="queue-num" id="queueNum">0</span>
</div>

<script>
(function() {
  'use strict';

  // ===== State =====
  const state = {
    ws: null,
    reconnectTimer: null,
    reconnectDelay: 1000,
    maxReconnectDelay: 30000,
    isConnected: false,
    questionQueue: [],
    isAnimating: false,
    currentDanmakuId: 0,
    trackAssignments: [0, 0, 0, 0, 0, 0],
    progressValue: 0,
    statusMode: 'listening',
  };

  // ===== DOM refs =====
  const statusBar = document.getElementById('statusBar');
  const statusIcon = document.getElementById('statusIcon');
  const statusText = document.getElementById('statusText');
  const progressFill = document.getElementById('progressFill');
  const charCount = document.getElementById('charCount');
  const typingIndicator = document.getElementById('typingIndicator');
  const questionCard = document.getElementById('questionCard');
  const questionText = document.getElementById('questionText');
  const connDot = document.getElementById('connDot');
  const connText = document.getElementById('connText');
  const queueCounter = document.getElementById('queueCounter');
  const queueNum = document.getElementById('queueNum');
  const tracks = [
    document.getElementById('track0'),
    document.getElementById('track1'),
    document.getElementById('track2'),
    document.getElementById('track3'),
    document.getElementById('track4'),
    document.getElementById('track5'),
  ];

  // ===== Status Bar =====
  function setStatus(mode, detail) {
    state.statusMode = mode;
    statusBar.classList.remove('idle', 'thinking');

    switch (mode) {
      case 'listening':
        statusIcon.textContent = '\uD83C\uDF99';
        statusText.textContent = detail || '姝ｅ湪鍚綘璁?..';
        statusBar.classList.add('idle');
        break;
      case 'processing':
        statusIcon.textContent = '\uD83E\uDDE0';
        statusText.textContent = detail || '姝ｅ湪鎬濊€?..';
        statusBar.classList.add('thinking');
        break;
      case 'ready':
        statusIcon.textContent = '\uD83D\uDCAC';
        statusText.textContent = detail || '闂宸茬敓鎴?;
        break;
      default:
        statusIcon.textContent = '\uD83C\uDF99';
        statusText.textContent = detail || '姝ｅ湪鍚綘璁?..';
        statusBar.classList.add('idle');
    }
  }

  function setProgress(value) {
    state.progressValue = Math.min(1, Math.max(0, value));
    progressFill.style.width = (state.progressValue * 100) + '%';
    const chars = Math.round(state.progressValue * 2000);
    charCount.textContent = chars;

    if (state.progressValue >= 1) {
      progressFill.classList.add('shimmer');
    } else {
      progressFill.classList.remove('shimmer');
    }
  }

  // ===== Typing Indicator =====
  function showTyping(show) {
    typingIndicator.classList.toggle('visible', show);
  }

  // ===== Question Card =====
  function showQuestionCard(text) {
    questionText.textContent = text;
    questionCard.classList.remove('visible', 'hiding');
    void questionCard.offsetWidth;
    questionCard.classList.add('visible');
    state.isAnimating = true;
  }

  function hideQuestionCard() {
    questionCard.classList.remove('visible');
    questionCard.classList.add('hiding');
    setTimeout(() => {
      questionCard.classList.remove('hiding');
      state.isAnimating = false;
      processQueue();
    }, 350);
  }

  // ===== Danmaku =====
  function getBestTrack() {
    let min = Infinity;
    let best = 0;
    for (let i = 0; i < state.trackAssignments.length; i++) {
      if (state.trackAssignments[i] < min) {
        min = state.trackAssignments[i];
        best = i;
      }
    }
    return best;
  }

  function fireDanmaku(text, isPink) {
    const trackIndex = getBestTrack();
    const track = tracks[trackIndex];
    state.trackAssignments[trackIndex]++;

    const el = document.createElement('div');
    el.className = 'danmaku-item' + (isPink ? ' pink-danmaku' : '');
    el.textContent = text;

    const speed = 10 + Math.random() * 4;
    el.style.setProperty('--speed', speed + 's');

    track.appendChild(el);

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        el.classList.add('scrolling');
      });
    });

    const viewportWidth = 1920;
    const estimatedTextWidth = text.length * 22 + 16;
    const totalDistance = viewportWidth + estimatedTextWidth;
    const scrollDuration = (totalDistance / (viewportWidth / speed)) * 1000;

    setTimeout(() => {
      if (el.parentNode) {
        el.remove();
        state.trackAssignments[trackIndex] = Math.max(0, state.trackAssignments[trackIndex] - 1);
      }
    }, scrollDuration + 200);
  }

  // ===== Queue =====
  function updateQueueCounter() {
    const count = state.questionQueue.length;
    if (count > 0) {
      queueCounter.classList.remove('hidden');
      queueNum.textContent = count;
    } else {
      queueCounter.classList.add('hidden');
    }
  }

  function enqueueQuestion(text) {
    state.questionQueue.push(text);
    updateQueueCounter();
    processQueue();
  }

  function processQueue() {
    if (state.isAnimating || state.questionQueue.length === 0) return;

    const text = state.questionQueue.shift();
    updateQueueCounter();

    showTyping(true);

    setTimeout(() => {
      showTyping(false);
      showQuestionCard(text);

      setTimeout(() => {
        fireDanmaku(text, true);
        hideQuestionCard();
      }, 4000);

    }, 1200);
  }

  // ===== WebSocket =====
  function connectWs() {
    if (state.ws && (state.ws.readyState === WebSocket.OPEN || state.ws.readyState === WebSocket.CONNECTING)) {
      return;
    }

    connDot.className = 'conn-dot connecting';
    connText.textContent = '杩炴帴涓?..';

    try {
      const ws = new WebSocket('ws://localhost:8765/ws');
      state.ws = ws;

      ws.onopen = () => {
        state.isConnected = true;
        state.reconnectDelay = 1000;
        connDot.className = 'conn-dot connected';
        connText.textContent = '宸茶繛鎺?;
        if (state.reconnectTimer) {
          clearTimeout(state.reconnectTimer);
          state.reconnectTimer = null;
        }
      };

      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          handleMessage(data);
        } catch (err) {
          console.warn('[WS] Parse error:', err);
        }
      };

      ws.onclose = () => {
        state.isConnected = false;
        connDot.className = 'conn-dot disconnected';
        connText.textContent = '鏈繛鎺?;
        scheduleReconnect();
      };

      ws.onerror = () => {
        ws.close();
      };

    } catch (err) {
      console.warn('[WS] Connection error:', err);
      scheduleReconnect();
    }
  }

  function scheduleReconnect() {
    if (state.reconnectTimer) return;
    state.reconnectTimer = setTimeout(() => {
      state.reconnectTimer = null;
      connectWs();
    }, state.reconnectDelay);
    state.reconnectDelay = Math.min(state.reconnectDelay * 2, state.maxReconnectDelay);
  }

  function handleMessage(data) {
    switch (data.type) {
      case 'question':
        if (data.text && typeof data.text === 'string') {
          enqueueQuestion(data.text);
        }
        break;

      case 'status':
        setStatus(data.status, data.detail || '');
        break;

      case 'progress':
        if (typeof data.value === 'number') {
          setProgress(data.value);
        }
        break;

      case 'char_count':
        if (typeof data.count === 'number' && typeof data.threshold === 'number') {
          setProgress(data.count / data.threshold);
        }
        break;

      default:
        break;
    }
  }

  // ===== Initialization =====
  function init() {
    setStatus('listening');
    setProgress(0);
    connectWs();
  }

  window.__overlay = {
    state,
    enqueueQuestion,
    setStatus,
    setProgress,
    connectWs,
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
