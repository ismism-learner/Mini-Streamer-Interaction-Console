# 小主播互动机 - 项目配置

# ===== 音频采集参数 =====
SAMPLE_RATE: 16000
CHANNELS: 1
DTYPE: int16
CHUNK_DURATION_MS: 30  # VAD 帧长度 30ms
SILENCE_TIMEOUT_MS: 1500  # 静默 1.5s 认为一句话说完
MAX_RECORDING_MINUTES: 10  # 最长连续录音 10 分钟

# ===== 触发条件 =====
MIN_WORDS_FOR_QUESTION: 50  # 测试用：50字就触发（正式用可以改回2000）
MAX_WORDS_FORCE_TRIGGER: 100  # 最多100字强制触发

# ===== 截断提示词 =====
# 当主播说的内容包含以下词/句时，不等攒满字数，立即生成问题
# 适合用来模拟"观众被戳中痛点"的即时互动
TRIGGER_PHRASES:
  - "你明白了吗"
  - "你们懂了没有"
  - "听懂了吗"
  - "你学会了吗"
  - "懂了吗"
  - "明白了没有"

# ===== 显示配置 =====
# 弹窗文字样式（前端 overlay 使用）
DISPLAY_FONT_FAMILY: "Microsoft YaHei UI, PingFang SC, sans-serif"
DISPLAY_FONT_SIZE: 28  # px
DISABLE_EMOJI: false  # true = LLM 生成问题时不使用 emoji

# ===== STT 配置 =====
# 使用 faster-whisper，模型大小可选: tiny, base, small, medium, large-v3
WHISPER_MODEL_SIZE: small
WHISPER_DEVICE: cpu  # 可选 cpu / cuda
WHISPER_COMPUTE_TYPE: int8  # 可选: float16, int8_float16, int8

# ===== LLM 配置 =====
# 硅基流动 API (兼容 OpenAI 格式)
LLM_API_BASE: https://api.siliconflow.cn/v1
LLM_API_KEY: sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx  # 请在 .env 中设置
LLM_MODEL: Qwen/Qwen3.6-27B  # 硅基流动支持的模型

# ===== 服务器配置 =====
SERVER_HOST: 127.0.0.1
SERVER_PORT: 8765